spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8088"
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ms-accesorios
              uri: http://localhost:8084
              predicates:
                - Path=/api/accesorios/**
            - id: ms-clientes
              uri: http://localhost:8082
              predicates:
                - Path=/api/clientes/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true